<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>到貨提醒儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Heiti TC',sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:14px}
  .header{background:#fff;border-bottom:1px solid #e5e5ea;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .header-logo{width:28px;height:28px;background:#1c1c1e;border-radius:6px;display:flex;align-items:center;justify-content:center}
  .header-logo svg{width:18px;height:18px;fill:#fff}
  .header h1{font-size:18px;font-weight:600;flex:1}
  .header-meta{font-size:12px;color:#8e8e93}
  .container{max-width:1200px;margin:0 auto;padding:20px}

  /* Upload section */
  .upload-section{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .upload-title{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .upload-card{border:1.5px dashed #c7c7cc;border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
  .upload-card:hover{border-color:#007aff;background:#f0f6ff}
  .upload-card.loaded{border-color:#34c759;border-style:solid;background:#f0fdf4}
  .upload-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-card-icon{font-size:22px;margin-bottom:4px}
  .upload-card-label{font-size:12px;font-weight:600;color:#1c1c1e}
  .upload-card-sub{font-size:11px;color:#8e8e93;margin-top:2px}
  .upload-card.loaded .upload-card-sub{color:#34c759}
  .btn-update{display:block;width:100%;margin-top:12px;padding:10px;background:#007aff;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-update:hover{opacity:.85}
  .btn-update:disabled{opacity:.4;cursor:not-allowed}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .stat-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .stat-card-label{font-size:11px;color:#8e8e93;margin-bottom:4px}
  .stat-card-value{font-size:26px;font-weight:700}
  .stat-card-value.apple{color:#007aff}
  .stat-card-value.third{color:#ff9500}
  .stat-card-value.total{color:#1c1c1e}

  /* Tabs */
  .tabs{display:flex;gap:0;margin-bottom:16px;background:#fff;border-radius:12px;padding:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .tab-btn{flex:1;padding:8px 16px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;color:#8e8e93}
  .tab-btn.active{background:#007aff;color:#fff;font-weight:600}
  .tab-btn.active.third-tab{background:#ff9500}

  /* Search */
  .search-bar{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:8px;align-items:center}
  .search-bar input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:#1c1c1e}
  .search-bar input::placeholder{color:#c7c7cc}
  .search-bar svg{width:16px;height:16px;fill:#8e8e93;flex-shrink:0}

  /* Table */
  .section{display:none}
  .section.active{display:block}
  .table-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .table-info{padding:12px 16px;border-bottom:1px solid #f2f2f7;font-size:12px;color:#8e8e93}
  table{width:100%;border-collapse:collapse}
  thead th{background:#f9f9fb;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e5e5ea;white-space:nowrap}
  tbody tr{border-bottom:1px solid #f2f2f7;transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#f9f9fb}
  tbody td{padding:10px 12px;vertical-align:top;font-size:13px}
  .col-no{width:40px;color:#8e8e93;font-size:12px}
  .col-order{white-space:nowrap;font-family:'SF Mono',monospace;font-size:12px;letter-spacing:.3px}
  .col-date{white-space:nowrap;font-size:12px;color:#636366}
  .col-item-no{white-space:nowrap;font-size:12px;color:#636366}
  .col-name{min-width:160px;font-weight:500}
  .col-model{font-size:11px;color:#8e8e93;white-space:nowrap}
  .col-cat{font-size:11px;color:#636366}
  .col-stock{text-align:center;font-weight:700}
  .stock-ok{color:#34c759}
  .col-who{font-size:12px;color:#636366}
  .col-note{max-width:200px;font-size:12px;color:#636366}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .badge-notified{background:#fff3cd;color:#856404}
  .badge-urgent{background:#fde8e8;color:#c0392b}
  .badge-normal{background:#e8f4fd;color:#1565c0}
  .badge-ok{background:#e8f8f0;color:#1a7a40}

  .empty{text-align:center;padding:40px;color:#8e8e93;font-size:14px}
  .highlight{background:#fffde7}

  /* Status filter row */
  .filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .filter-btn{padding:5px 12px;border:1.5px solid #e5e5ea;border-radius:20px;background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;color:#636366;white-space:nowrap}
  .filter-btn:hover{border-color:#007aff;color:#007aff}
  .filter-btn.active.f-all{background:#48484a;border-color:#48484a;color:#fff;font-weight:600}
  .filter-btn.active.f-urgent{background:#c0392b;border-color:#c0392b;color:#fff;font-weight:600}
  .filter-btn.active.f-notified{background:#b7730a;border-color:#b7730a;color:#fff;font-weight:600}
  .filter-btn.active.f-pending{background:#1565c0;border-color:#1565c0;color:#fff;font-weight:600}
  .filter-cnt{display:inline-block;border-radius:10px;padding:0 5px;font-size:11px;margin-left:2px;font-variant-numeric:tabular-nums}
  .filter-btn.active .filter-cnt{background:rgba(255,255,255,.25);color:#fff}
  .filter-btn:not(.active) .filter-cnt{background:#f2f2f7;color:#636366}
  /* Group toggle */
  .group-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:#636366;cursor:pointer;margin-left:auto;white-space:nowrap;user-select:none}
  .group-toggle input{cursor:pointer;accent-color:#007aff;width:14px;height:14px}
  /* Group header row */
  .group-hdr td{background:#f0f4ff;padding:7px 12px;border-top:2px solid #d0daf8;border-bottom:1px solid #d0daf8}
  .group-hdr-no{font-family:'SF Mono',monospace;font-weight:700;font-size:13px;color:#1c1c1e;letter-spacing:.4px}
  .group-hdr-meta{font-size:12px;color:#636366;margin-left:10px}
  .group-hdr-cnt{margin-left:8px;background:#007aff;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:600}
  .group-hdr-cnt.urgent{background:#c0392b}
  .group-hdr-cnt.notified{background:#b7730a}
  .indent-arrow{color:#c7c7cc;font-size:13px}

  /* Responsive */
  @media(max-width:768px){
    .upload-grid{grid-template-columns:1fr}
    .stats-row{grid-template-columns:repeat(3,1fr)}
    table{font-size:12px}
    thead th,tbody td{padding:8px 8px}
    .col-model,.col-cat{display:none}
  }
</style>
</head>

</div>

// ── State ────────────────────────────────────────────────────────────────
const pending = {order: null, apple: null, third: null};
let currentData = null;
let currentTab = 'apple';
let activeFilter = 'all';
const STORAGE_KEY = 'arrival_dashboard_v2';

// ── Excel date conversion ────────────────────────────────────────────────
function excelDate(serial) {
  if (!serial || isNaN(serial)) return '';
  const d = new Date(Math.round((Number(serial) - 25569) * 86400000));
  const y = d.getUTCFullYear(), m = String(d.getUTCMonth()+1).padStart(2,'0'), day = String(d.getUTCDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

// ── Status classification ────────────────────────────────────────────────
function getStatus(note) {
  const n = note || '';
  if (/已通知|已電聯|已到貨通知/.test(n)) return 'notified';
  if (/缺貨|門市缺貨|調撥中/.test(n)) return 'urgent';
  return 'pending';
}
function getStatusLabel(s) {
  return {urgent:'急通知', notified:'已通知未取', pending:'待通知'}[s] || s;
}
function getFilterLabel(f) {
  return {all:'全部', urgent:'急通知', notified:'已通知未取', pending:'待通知'}[f] || f;
}

// ── Badge helper ─────────────────────────────────────────────────────────
function makeBadge(note) {
  const s = getStatus(note);
  if (s === 'notified') return `<span class="badge badge-notified">已通知未取</span>`;
  if (s === 'urgent')   return `<span class="badge badge-urgent">急通知</span>`;
  return `<span class="badge badge-normal">待通知</span>`;
}

// ── Render table ─────────────────────────────────────────────────────────
function renderTable(alerts, tbodyId, infoId, emptyId) {
  const tbody = document.getElementById(tbodyId);
  const info  = document.getElementById(infoId);
  const empty = document.getElementById(emptyId);
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const grouped = document.getElementById('groupByOrder').checked;

  // 1. status filter
  let filtered = activeFilter === 'all' ? alerts : alerts.filter(a => getStatus(a.note) === activeFilter);
  // 2. search filter
  if (q) filtered = filtered.filter(a =>
    [a.orderNo, a.itemName, a.itemNo, a.modelNo, a.salesperson, a.category, a.note]
      .some(v => (v||'').toLowerCase().includes(q)));

  const extra = (activeFilter !== 'all' ? `，${getFilterLabel(activeFilter)}` : '') + (q ? `，搜尋「${q}」` : '');
  info.textContent = `共 ${filtered.length} 筆${extra}`;

  if (filtered.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const hl = t => {
    if (!q) return t || '';
    const s = String(t||''), lo = s.toLowerCase(), i = lo.indexOf(q);
    if (i < 0) return s;
    return s.slice(0,i) + `<mark class="highlight">${s.slice(i,i+q.length)}</mark>` + s.slice(i+q.length);
  };

  const rowTpl = (a, idx, indented) => `
    <tr>
      <td class="col-no">${idx}</td>
      <td class="col-order">${indented ? '<span class="indent-arrow">↳</span>' : hl(a.orderNo)}</td>
      <td class="col-date">${hl(a.saleDate)}</td>
      <td class="col-item-no">${hl(a.itemNo)}</td>
      <td class="col-name">${hl(a.itemName)}</td>
      <td class="col-model">${hl(a.modelNo)}</td>
      <td class="col-cat">${hl(a.category)}</td>
      <td class="col-stock"><span class="stock-ok">${a.stock}</span></td>
      <td class="col-who">${hl(a.salesperson)}</td>
      <td class="col-note">${makeBadge(a.note)}<br><span style="color:#8e8e93;font-size:11px">${hl(a.note)}</span></td>
    </tr>`;

  if (!grouped) {
    tbody.innerHTML = filtered.map((a,i) => rowTpl(a, i+1, false)).join('');
    return;
  }

  // Group by orderNo
  const groups = new Map();
  for (const a of filtered) {
    if (!groups.has(a.orderNo)) groups.set(a.orderNo, []);
    groups.get(a.orderNo).push(a);
  }
  let html = '', n = 0;
  for (const [orderNo, items] of groups) {
    const f = items[0];
    // dominant status for the group badge
    const statuses = items.map(a => getStatus(a.note));
    const domStatus = statuses.includes('urgent') ? 'urgent' : statuses.includes('notified') ? 'notified' : 'pending';
    html += `<tr class="group-hdr">
      <td colspan="10">
        <span class="group-hdr-no">${hl(orderNo)}</span>
        <span class="group-hdr-meta">${f.saleDate}　${f.salesperson}</span>
        <span class="group-hdr-cnt ${domStatus}">${items.length} 件　${getStatusLabel(domStatus)}</span>
      </td>
    </tr>`;
    for (const a of items) html += rowTpl(a, ++n, true);
  }
  tbody.innerHTML = html;
}

// ── Update stats ─────────────────────────────────────────────────────────
function updateStats(data) {
  const a = data.appleAlerts.length, t = data.thirdAlerts.length;
  document.getElementById('statApple').textContent = a + ' 筆';
  document.getElementById('statThird').textContent = t + ' 筆';
  document.getElementById('statTotal').textContent = (a+t) + ' 筆';
  document.getElementById('headerMeta').textContent =
    `資料日期：${data.generated || '—'} ｜ 客訂：${data.orderFile||'—'} ｜ 原廠：${data.appleStockFile||'—'} ｜ 副廠：${data.thirdStockFile||'—'}`;
}

// ── Filter counts ────────────────────────────────────────────────────────
function updateFilterCounts() {
  if (!currentData) return;
  const alerts = currentTab === 'apple' ? currentData.appleAlerts : currentData.thirdAlerts;
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const base = q ? alerts.filter(a =>
    [a.orderNo, a.itemName, a.itemNo, a.modelNo, a.salesperson, a.category, a.note]
      .some(v => (v||'').toLowerCase().includes(q))) : alerts;
  const counts = {all: base.length, urgent: 0, notified: 0, pending: 0};
  for (const a of base) counts[getStatus(a.note)]++;
  ['all','urgent','notified','pending'].forEach(f => {
    const el = document.getElementById('fcnt-'+f);
    if (el) el.textContent = counts[f];
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === activeFilter);
  });
}

// ── Set filter ───────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  updateFilterCounts();
  if (!currentData) return;
  renderTable(currentData.appleAlerts, 'tbody-apple', 'info-apple', 'empty-apple');
  renderTable(currentData.thirdAlerts, 'tbody-third', 'info-third', 'empty-third');
}

// ── Full render ──────────────────────────────────────────────────────────
function render(data) {
  currentData = data;
  updateStats(data);
  updateFilterCounts();
  renderTable(data.appleAlerts, 'tbody-apple', 'info-apple', 'empty-apple');
  renderTable(data.thirdAlerts, 'tbody-third', 'info-third', 'empty-third');
}

// ── Tab switch ───────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['apple','third'].forEach(t => {
    document.getElementById('section-'+t).classList.toggle('active', t===tab);
    const btn = document.getElementById('tab-'+t);
    btn.classList.toggle('active', t===tab);
  });
  updateFilterCounts();
}

// ── Search filter ────────────────────────────────────────────────────────
function filterTable() {
  if (!currentData) return;
  updateFilterCounts();
  renderTable(currentData.appleAlerts, 'tbody-apple', 'info-apple', 'empty-apple');
  renderTable(currentData.thirdAlerts, 'tbody-third', 'info-third', 'empty-third');
}

// ── Parse customer order file ────────────────────────────────────────────
function parseOrders(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  const orders = [];
  for (let i = 2; i < rows.length; i++) {
    const r = rows[i];
    const rawNo = r[0];
    if (!rawNo) continue;
    const orderNo = String(Math.round(Number(rawNo)) || rawNo).replace(/\.0+$/,'').padStart(12,'0');
    if (!/^\d{12}$/.test(orderNo)) continue;
    const ordered = parseInt(r[7])||0, shipped = parseInt(r[8])||0;
    if (ordered - shipped <= 0) continue;
    orders.push({
      orderNo, saleDate: excelDate(r[1]),
      salesperson: r[3]||'', itemNo: String(r[4]||'').trim(),
      itemName: r[5]||'', modelNo: String(r[6]||'').trim(),
      orderedQty: ordered, unfulfilledQty: ordered - shipped,
      note: r[10]||''
    });
  }
  return orders;
}

// ── Parse inventory file ─────────────────────────────────────────────────
function parseInventory(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if (rows.length < 2) return {};
  const hdr = rows[0];
  const idx = {};
  ['comp_item_no','comp_item_nam','comp_model_no','comp_stk_tot','comp_desc_c'].forEach(k => {
    idx[k] = hdr.indexOf(k);
  });
  const inv = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const no = String(r[idx.comp_item_no]||'').trim();
    if (!no) continue;
    const stk = parseFloat(r[idx.comp_stk_tot])||0;
    inv[no] = {
      itemName: r[idx.comp_item_nam]||'',
      modelNo: String(r[idx.comp_model_no]||'').trim(),
      stock: stk > 0 ? Math.round(stk) : 0,
      category: r[idx.comp_desc_c]||''
    };
  }
  return inv;
}

// ── Compute alerts ───────────────────────────────────────────────────────
function computeAlerts(orders, appleInv, thirdInv, meta) {
  const appleAlerts = [], thirdAlerts = [];
  const seenA = new Set(), seenT = new Set();
  for (const o of orders) {
    const key = `${o.orderNo}|${o.itemNo}`;
    if (o.itemNo in appleInv) {
      const inv = appleInv[o.itemNo];
      if (inv.stock > 0 && !seenA.has(key)) {
        seenA.add(key);
        appleAlerts.push({...o, stock: inv.stock, category: inv.category||o.category, itemName: o.itemName||inv.itemName, modelNo: o.modelNo||inv.modelNo});
      }
    }
    if (o.itemNo in thirdInv) {
      const inv = thirdInv[o.itemNo];
      if (inv.stock > 0 && !seenT.has(key)) {
        seenT.add(key);
        thirdAlerts.push({...o, stock: inv.stock, category: inv.category||o.category, itemName: o.itemName||inv.itemName, modelNo: o.modelNo||inv.modelNo});
      }
    }
  }
  return {
    generated: new Date().toISOString().slice(0,10),
    orderFile: meta.orderFile, appleStockFile: meta.appleStockFile, thirdStockFile: meta.thirdStockFile,
    appleAlerts, thirdAlerts
  };
}

// ── File upload handler ──────────────────────────────────────────────────
function handleFile(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    try {
      const wb = XLSX.read(data, {type:'array', codepage: 950});
      pending[type] = {wb, name: file.name};
      const card = document.getElementById('card-'+type);
      card.classList.add('loaded');
      document.getElementById('sub-'+type).textContent = '✓ ' + file.name;
      checkUpdateReady();
    } catch(err) {
      alert(`讀取 ${file.name} 失敗：${err.message}`);
    }
  };
  reader.readAsArrayBuffer(file);
}

function checkUpdateReady() {
  const ready = pending.order || pending.apple || pending.third;
  document.getElementById('btnUpdate').disabled = !ready;
}

// ── Run update ───────────────────────────────────────────────────────────
function runUpdate() {
  const base = currentData || INITIAL_DATA;
  // Use new data if uploaded, otherwise keep existing parsed data
  let orders = null, appleInv = null, thirdInv = null;
  const meta = {
    orderFile: base.orderFile,
    appleStockFile: base.appleStockFile,
    thirdStockFile: base.thirdStockFile
  };

  if (pending.order) {
    orders = parseOrders(pending.order.wb);
    meta.orderFile = pending.order.name.replace(/\.(xlsx?|xls)$/i,'');
  }
  if (pending.apple) {
    appleInv = parseInventory(pending.apple.wb);
    meta.appleStockFile = pending.apple.name.replace(/\.(xlsx?|xls)$/i,'');
  }
  if (pending.third) {
    thirdInv = parseInventory(pending.third.wb);
    meta.thirdStockFile = pending.third.name.replace(/\.(xlsx?|xls)$/i,'');
  }

  // If only some files updated, we need to re-compute from scratch
  // For simplicity: if all 3 new files uploaded, full recompute
  // Otherwise, update stored data with new inventory data only
  if (orders && appleInv && thirdInv) {
    const newData = computeAlerts(orders, appleInv, thirdInv, meta);
    saveData(newData);
    render(newData);
    alert(`更新完成！Apple 原廠：${newData.appleAlerts.length} 筆 ／ 副廠：${newData.thirdAlerts.length} 筆`);
  } else {
    alert('請同時上傳三個檔案（客訂 + Apple原廠庫存 + 副廠庫存）以重新計算。\n若只更新庫存，請一次上傳全部三個檔案。');
  }
}

// ── LocalStorage ─────────────────────────────────────────────────────────
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

// ── Init ──────────────────────────────────────────────────────────────────
(function init() {
  const stored = loadData();
  render(stored || INITIAL_DATA);
  if (!stored) saveData(INITIAL_DATA);
})();
</script>
